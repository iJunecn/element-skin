version: '3.8'
networks:
  element-skin:
    driver: bridge
  
services:
  # 后端服务
  backend:
    build:
      context: ./skin-backend
      network: host
    container_name: element-skin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/data
    networks:
      - element-skin

  # 前端服务
  frontend:
    build:
      context: ./element-skin
      network: host
      args:
        - VITE_BASE_PATH=${VITE_BASE_PATH:-/}
        - VITE_API_BASE=${VITE_API_BASE:-/skinapi}
        - BUILD_MODE=${BUILD_MODE:-standard}
    container_name: element-skin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./data/textures:/usr/share/nginx/html/static/textures:ro
      - ./data/carousel:/usr/share/nginx/html/static/carousel:ro
    networks:
      - element-skin
